name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if auto-commit
        id: skip
        run: |
          if git log -1 --format='%s' | grep -q '\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: npm ci --ignore-scripts

      - name: Build client
        if: steps.skip.outputs.skip != 'true'
        run: npm run build -w client
        env:
          NODE_ENV: production

      - name: Copy build to docs/
        if: steps.skip.outputs.skip != 'true'
        run: |
          rm -rf docs
          cp -r client/dist docs

      - name: Commit and push to main
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: deploy to docs/ [skip ci]"
          git push origin main

      # Note: GitHub Pages is configured in repo settings to serve from main branch /docs folder.
      # The built-in pages-build-deployment workflow handles deployment automatically on push.
